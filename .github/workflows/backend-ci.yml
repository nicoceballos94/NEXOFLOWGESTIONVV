name: Backend CI

permissions:
  contents: read

on:
  push:
    paths:
      - "Gestion Vial Victoria/gestion_rrhh/**"
      - "Gestion Vial Victoria/frontend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "Gestion Vial Victoria/gestion_rrhh/**"
      - "Gestion Vial Victoria/frontend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: "Gestion Vial Victoria/gestion_rrhh"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: postgres://rrhh:rrhh@localhost:5432/rrhh
      SECRET_KEY: ci-secret
      DJANGO_SETTINGS_MODULE: config.settings.dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "Gestion Vial Victoria/gestion_rrhh/requirements*.txt"
      - name: Build and start hardened PostgreSQL
        run: |
          docker build --pull --file Dockerfile.postgres \
            --tag gestion-rrhh-postgres:ci .
          docker run -d --name rrhh-ci-postgres \
            --security-opt no-new-privileges=true \
            --cap-drop ALL \
            --cap-add CHOWN \
            --cap-add DAC_OVERRIDE \
            --cap-add FOWNER \
            --cap-add SETGID \
            --cap-add SETUID \
            --tmpfs /var/lib/postgresql/data:size=512m,mode=0700 \
            -p 127.0.0.1:5432:5432 \
            -e POSTGRES_DB=rrhh \
            -e POSTGRES_USER=rrhh \
            -e POSTGRES_PASSWORD=rrhh \
            gestion-rrhh-postgres:ci
          for intento in $(seq 1 30); do
            docker exec rrhh-ci-postgres pg_isready -U rrhh -d rrhh && break
            sleep 1
          done
          docker exec rrhh-ci-postgres pg_isready -U rrhh -d rrhh
      - run: python -m pip install --require-hashes -r requirements-dev.txt
      - name: Audit production dependencies
        run: python -m pip_audit --strict --require-hashes -r requirements.txt
      - run: ruff check .
      # Falla si un modelo cambió sin su migración. Sin `||`: generarlas acá dejaría
      # pasar en verde justo el error que el check busca.
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py migrate
      - run: pytest
      - name: Prove PostgreSQL runtime-role boundaries
        run: |
          install -d -m 0700 /tmp/rrhh-ci-db-secrets
          printf '%s' 'rrhh' \
            > /tmp/rrhh-ci-db-secrets/postgres_admin_password
          printf '%s' 'ci-runtime-disposable-password' \
            > /tmp/rrhh-ci-db-secrets/postgres_app_password
          chmod 0444 /tmp/rrhh-ci-db-secrets/*

          docker run --rm --user 70:70 --network host \
            -e POSTGRES_HOST=127.0.0.1 \
            -e POSTGRES_PORT=5432 \
            -e POSTGRES_DB=rrhh \
            -e POSTGRES_ADMIN_USER=rrhh \
            -e POSTGRES_APP_USER=rrhh_runtime_ci \
            -v /tmp/rrhh-ci-db-secrets/postgres_admin_password:/run/secrets/postgres_admin_password:ro \
            -v /tmp/rrhh-ci-db-secrets/postgres_app_password:/run/secrets/postgres_app_password:ro \
            -v "$PWD/deploy/db/provision-app-role.sh:/opt/rrhh/provision-app-role.sh:ro" \
            gestion-rrhh-postgres:ci \
            /bin/sh /opt/rrhh/provision-app-role.sh

          docker run --rm --user 70:70 --network host \
            -e POSTGRES_HOST=127.0.0.1 \
            -e POSTGRES_PORT=5432 \
            -e POSTGRES_DB=rrhh \
            -e POSTGRES_ADMIN_USER=rrhh \
            -e POSTGRES_APP_USER=rrhh_runtime_ci \
            -v /tmp/rrhh-ci-db-secrets/postgres_admin_password:/run/secrets/postgres_admin_password:ro \
            -v /tmp/rrhh-ci-db-secrets/postgres_app_password:/run/secrets/postgres_app_password:ro \
            -v "$PWD/deploy/db/verify-app-role.sh:/opt/rrhh/verify-app-role.sh:ro" \
            gestion-rrhh-postgres:ci \
            /bin/sh /opt/rrhh/verify-app-role.sh

          rm -rf /tmp/rrhh-ci-db-secrets
      - name: Validate OpenAPI contract
        run: python manage.py spectacular --validate --fail-on-warn --file /tmp/openapi.yaml
      - name: Validate production settings
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          SECRET_KEY: "ci-only-RRHH-9fd4b1c28ac7491ca8c58b8531814a920a8f85e8"
          ALLOWED_HOSTS: "rrhh.example.test"
          CSRF_TRUSTED_ORIGINS: "https://rrhh.example.test"
        run: python manage.py check --deploy --fail-level WARNING
      - name: Build production image
        run: docker build --tag gestion-rrhh:ci .
      - name: Build production web gateway
        run: docker build --file Dockerfile.web --tag gestion-rrhh-web:ci ..
      - name: Check image user and excluded files
        run: |
          test "$(docker image inspect gestion-rrhh:ci --format '{{.Config.User}}')" = "app"
          test "$(docker run --rm --entrypoint id gestion-rrhh:ci -u)" = "10001"
          test "$(docker run --rm --entrypoint id gestion-rrhh:ci -g)" = "10001"
          docker run --rm --entrypoint /bin/sh gestion-rrhh-postgres:ci -c \
            'readlink -f /usr/local/bin/gosu | grep -qx /sbin/su-exec \
            && gosu nobody id -u | grep -qx 65534'
          docker run --rm --entrypoint /bin/sh gestion-rrhh:ci -c \
            'test ! -e /app/.env && test ! -e /app/.git && test ! -e /app/.venv'
          test -n "$(docker image inspect gestion-rrhh-web:ci --format '{{.Config.User}}')"
          test "$(docker image inspect gestion-rrhh-web:ci --format '{{.Config.User}}')" != "root"
          test "$(docker image inspect gestion-rrhh-web:ci --format '{{.Config.User}}')" != "0"
          docker run --rm --entrypoint /bin/sh gestion-rrhh-web:ci -c \
            "test -s /usr/share/nginx/html/index.html \
            && ! grep -R -E 'unpkg\\.com|fonts\\.googleapis\\.com|fonts\\.gstatic\\.com|new Function\\(|eval\\(' /usr/share/nginx/html"
          docker run --rm --add-host api:127.0.0.1 --entrypoint nginx \
            gestion-rrhh-web:ci -t
      - name: Validate production network isolation
        env:
          RRHH_SECRET_KEY_FILE: /tmp/rrhh-django-secret
          RRHH_DB_ADMIN_PASSWORD_FILE: /tmp/rrhh-postgres-admin-secret
          RRHH_DB_APP_PASSWORD_FILE: /tmp/rrhh-postgres-app-secret
          ALLOWED_HOSTS: rrhh.example.test
          CSRF_TRUSTED_ORIGINS: https://rrhh.example.test
          POSTGRES_DB: rrhh
          POSTGRES_ADMIN_USER: rrhh_owner
          POSTGRES_APP_USER: rrhh_runtime
          RRHH_POSTGRES_VOLUME: rrhh-ci-postgres
          RRHH_MEDIA_VOLUME: rrhh-ci-media
          RRHH_POSTGRES_IMAGE: gestion-rrhh-postgres:ci
        run: |
          touch "$RRHH_SECRET_KEY_FILE" \
            "$RRHH_DB_ADMIN_PASSWORD_FILE" \
            "$RRHH_DB_APP_PASSWORD_FILE"
          docker compose --profile ops -f docker-compose.prod.yml \
            config --format json > /tmp/rrhh-compose.json
          python - <<'PY'
          import json

          with open("/tmp/rrhh-compose.json", encoding="utf-8") as archivo:
              compose = json.load(archivo)
          servicios = compose["services"]

          redes = {
              nombre: set(servicio.get("networks", {}))
              for nombre, servicio in servicios.items()
          }
          assert redes["web"] == {"proxy", "rrhh-app"}, redes
          assert redes["api"] == {"rrhh-app", "rrhh-db"}, redes
          assert redes["db"] == {"rrhh-db"}, redes
          assert redes["db-provision"] == {"rrhh-db"}, redes
          assert redes["migrate"] == {"rrhh-db"}, redes
          assert redes["db-permissions-check"] == {"rrhh-db"}, redes
          assert all("ports" not in servicio for servicio in servicios.values())

          secretos = {
              nombre: {
                  entrada["source"]
                  for entrada in servicio.get("secrets", [])
              }
              for nombre, servicio in servicios.items()
          }
          assert secretos["api"] == {
              "django_secret_key",
              "postgres_app_password",
          }, secretos
          assert secretos["db"] == {"postgres_admin_password"}, secretos
          assert secretos["migrate"] == {
              "django_secret_key",
              "postgres_admin_password",
          }, secretos
          assert secretos["db-provision"] == {
              "postgres_admin_password",
              "postgres_app_password",
          }, secretos
          assert secretos["db-permissions-check"] == {
              "postgres_admin_password",
              "postgres_app_password",
          }, secretos

          assert servicios["api"]["environment"]["POSTGRES_USER"] == "rrhh_runtime"
          assert servicios["migrate"]["environment"]["POSTGRES_USER"] == "rrhh_owner"
          assert servicios["db-provision"]["user"] == "70:70"
          assert servicios["db-permissions-check"]["user"] == "70:70"
          assert servicios["db"]["image"] == "gestion-rrhh-postgres:ci"
          assert servicios["db-provision"]["image"] == "gestion-rrhh-postgres:ci"
          assert servicios["db-permissions-check"]["image"] == "gestion-rrhh-postgres:ci"
          assert set(servicios["db"]["cap_add"]) == {
              "CHOWN",
              "DAC_OVERRIDE",
              "FOWNER",
              "SETGID",
              "SETUID",
          }
          assert servicios["db"]["cap_drop"] == ["ALL"]
          assert {
              nombre: servicio["pids_limit"]
              for nombre, servicio in servicios.items()
          } == {
              "db": 256,
              "db-provision": 64,
              "api": 256,
              "migrate": 128,
              "db-permissions-check": 64,
              "web": 128,
          }
          assert "migrate" not in servicios["api"]["depends_on"]
          assert "migrate" in servicios["db-permissions-check"]["depends_on"]
          assert compose["volumes"]["pgdata"] == {
              "name": "rrhh-ci-postgres",
              "external": True,
          }
          assert compose["volumes"]["media"] == {
              "name": "rrhh-ci-media",
              "external": True,
          }
          PY
      - name: Stop CI database
        if: always()
        run: docker rm -f rrhh-ci-postgres || true
