name: Backend CI

on:
  push:
    paths:
      - "Gestion Vial Victoria/gestion_rrhh/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "Gestion Vial Victoria/gestion_rrhh/**"

defaults:
  run:
    working-directory: "Gestion Vial Victoria/gestion_rrhh"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rrhh
          POSTGRES_USER: rrhh
          POSTGRES_PASSWORD: rrhh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rrhh"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://rrhh:rrhh@localhost:5432/rrhh
      SECRET_KEY: ci-secret
      DJANGO_SETTINGS_MODULE: config.settings.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "Gestion Vial Victoria/gestion_rrhh/requirements*.txt"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: python manage.py makemigrations usuarios organizacion --check --dry-run || python manage.py makemigrations usuarios organizacion
      - run: python manage.py migrate
      - run: pytest
