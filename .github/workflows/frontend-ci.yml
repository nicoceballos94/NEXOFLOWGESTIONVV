name: Frontend CI

permissions:
  contents: read

on:
  push:
    paths:
      - "Gestion Vial Victoria/frontend/**"
      - "Gestion Vial Victoria/.gitattributes"
      - "Gestion Vial Victoria/gestion_rrhh/apps/empleados/api/serializers.py"
      - "Gestion Vial Victoria/gestion_rrhh/apps/novedades/api/serializers.py"
      - "Gestion Vial Victoria/gestion_rrhh/apps/organizacion/api/serializers.py"
      - "Gestion Vial Victoria/gestion_rrhh/config/urls.py"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "Gestion Vial Victoria/frontend/**"
      - "Gestion Vial Victoria/.gitattributes"
      - "Gestion Vial Victoria/gestion_rrhh/apps/empleados/api/serializers.py"
      - "Gestion Vial Victoria/gestion_rrhh/apps/novedades/api/serializers.py"
      - "Gestion Vial Victoria/gestion_rrhh/apps/organizacion/api/serializers.py"
      - "Gestion Vial Victoria/gestion_rrhh/config/urls.py"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: "Gestion Vial Victoria/frontend"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # Todo usa la stdlib. Primero se comprueba que las redes de seguridad corten;
      # después el build valida el diseño y el artefacto completo.
      - run: python tests/test_invariantes_diseno.py
      - run: python tests/test_guardas_frontend.py
      - run: python build.py
