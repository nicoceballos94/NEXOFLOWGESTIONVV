services:
  db:
    image: gestion-rrhh-postgres:dev
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rrhh}
      POSTGRES_USER: ${POSTGRES_USER:-rrhh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rrhh}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # dev local; nunca expuesto a la LAN
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rrhh}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed_inicial && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${POSTGRES_USER:-rrhh}:${POSTGRES_PASSWORD:-rrhh}@db:5432/${POSTGRES_DB:-rrhh}
      SECRET_KEY: ${SECRET_KEY:-insegura-solo-para-dev}
      MEDIA_ROOT: /app/media
    volumes:
      - .:/app
      # Los respaldos de documentos viven en un volumen propio: sin esto, un
      # `docker compose down` se lleva puestos los scans de apto médico y carnet.
      # El día del deploy esto se reemplaza por S3/R2 vía STORAGES, sin tocar el modelo.
      - media:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media:
