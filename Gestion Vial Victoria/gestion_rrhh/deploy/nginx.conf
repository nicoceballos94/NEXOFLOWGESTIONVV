map $http_x_forwarded_proto $rrhh_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Nginx Proxy Manager debe reemplazar X-Real-IP por $remote_addr. El fallback
# conserva una IP útil si el gateway se ejecuta aislado durante una prueba.
map $http_x_real_ip $rrhh_real_ip {
    default $http_x_real_ip;
    ""      $remote_addr;
}

# El shell de la SPA nunca se cachea: puede contener referencias a una versión anterior de
# los assets. Los assets con hash sí son inmutables y se cachean en su location específica.
map $uri $rrhh_cache_control {
    default                                                    "";
    "/index.html"                                              "no-store";
    ~*\.[0-9a-f]+\.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ "public, max-age=31536000, immutable";
}

# No registrar query strings: búsquedas y filtros pueden contener DNI u otros datos
# personales. La IP y el path sin argumentos alcanzan para operación e incidentes.
log_format rrhh '$rrhh_real_ip - $request_method $uri $server_protocol '
                '$status $body_bytes_sent $request_time';

upstream rrhh_api {
    server api:8000;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    access_log /var/log/nginx/access.log rrhh;

    client_max_body_size 12m;
    client_body_timeout 30s;
    keepalive_timeout 30s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Strict-Transport-Security "max-age=2592000; includeSubDomains" always;
    add_header Cache-Control $rrhh_cache_control always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' data:; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; object-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests" always;

    # Liveness del gateway para Docker. No implica que Django esté disponible.
    location = /gateway-healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","component":"gateway"}';
    }

    # El health público llega realmente a la readiness Django+PostgreSQL. Así
    # NPM/monitoreo no muestran verde cuando el gateway está vivo pero la app no opera.
    location = /healthz {
        proxy_pass http://rrhh_api/healthz/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $rrhh_real_ip;
        proxy_set_header X-Forwarded-For $rrhh_real_ip;
        proxy_set_header X-Forwarded-Proto $rrhh_forwarded_proto;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    location = /healthz/ {
        proxy_pass http://rrhh_api/healthz/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $rrhh_real_ip;
        proxy_set_header X-Forwarded-For $rrhh_real_ip;
        proxy_set_header X-Forwarded-Proto $rrhh_forwarded_proto;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    location = /api {
        return 308 /api/;
    }

    location ^~ /api/ {
        proxy_pass http://rrhh_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $rrhh_real_ip;
        proxy_set_header X-Forwarded-For $rrhh_real_ip;
        proxy_set_header X-Forwarded-Proto $rrhh_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /admin {
        return 308 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass http://rrhh_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $rrhh_real_ip;
        proxy_set_header X-Forwarded-For $rrhh_real_ip;
        proxy_set_header X-Forwarded-Proto $rrhh_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /static/ {
        proxy_pass http://rrhh_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $rrhh_real_ip;
        proxy_set_header X-Forwarded-For $rrhh_real_ip;
        proxy_set_header X-Forwarded-Proto $rrhh_forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location ~* \.[0-9a-f]+\.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
